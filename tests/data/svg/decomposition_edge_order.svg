<?xml version="1.0" encoding="UTF-8"?>
<!-- Two overlapping triangles for testing trapezoid decomposition edge ordering.
     P1: Triangle with apex at bottom y=0, base at y=2
         Vertices CCW: (0,2) -> (4,2) -> (2,0)
     P2: Triangle shifted right, apex at bottom y=0
         Vertices CCW: (1,3) -> (5,3) -> (3,0)
     Both apexes share y=0, so left/right edges have coincident x at that
     y-band boundary. The decomposer must use dxdy to break ties and avoid
     producing inverted trapezoids. -->
<svg width="440" height="280" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <polygon points="25,100 325,100 175,250"
      fill="none" stroke="blue" stroke-width="2"/>
  <polygon points="100,25 400,25 250,250"
      fill="none" stroke="red" stroke-width="2"/>
</svg>
