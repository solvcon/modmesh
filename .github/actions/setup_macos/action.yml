name: Set up solvcon CI dependencies on MacOS
description: Set up the necessary dependencies for running CI tests on Github action MacOS runners

inputs:
  workflow:
    description: The name of the workflow that will use this action
    required: true

runs:
  using: composite
  steps:
    - name: Creates /usr/local/include for macos runner
      shell: bash
      run: |
        echo "::group::Creates /usr/local/include for macos runner"
        # Some mac runner does not have /usr/local/include and cmake sometimes crashes
        sudo mkdir -p /usr/local/include
        echo "::endgroup::"

    - name: Use the offscreen Qt platform
      if: "${{ inputs.workflow == 'lint' || inputs.workflow == 'build' }}"
      shell: bash
      run: |
        echo "::group::Use the offscreen Qt platform"
        # macOS runners are headless and ship no xcb plugin, so keep the
        # offscreen QPA plugin. The job-level env no longer pins
        # QT_QPA_PLATFORM; set it here for the rest of the job.
        echo "QT_QPA_PLATFORM=offscreen" >> "${GITHUB_ENV}"
        echo "::endgroup::"

    - name: dependency by homebrew
      if: "${{ inputs.workflow == 'lint' || inputs.workflow == 'build' }}"
      shell: bash
      run: |
        echo "::group::dependency by homebrew"
        export HOMEBREW_NO_AUTO_UPDATE=1
        export HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1
        # This has been replaced by the 'install qt' section below to manage
        # qt6 versioning independently from the OS.
        # brew install llvm@21 qt6
        brew install llvm@22
        # The macos-26 runner ships with Homebrew llvm@20 linked into
        # /usr/local/bin/ (clang, clang++, clang-format, clang-tidy, etc.).
        # Use -sf to overwrite the existing clang-tidy with our llvm@22
        # version, and remove clang/clang++ so that ccache-action
        # (create-symlink: true) can create its own symlinks.
        # clang-format is installed separately via pip (see below) so that
        # both CI platforms use the version pinned by
        # CLANG_FORMAT_CI_VERSION in the Makefile.
        # Ref: https://github.com/actions/runner-images/blob/main/images/macos/macos-26-Readme.md
        ln -sf "$(brew --prefix llvm@22)/bin/clang-tidy" "/usr/local/bin/clang-tidy"
        rm -f /usr/local/bin/clang /usr/local/bin/clang++ /usr/local/bin/clang-format
        echo "::endgroup::"

    - name: install qt
      if: "${{ inputs.workflow == 'lint' || inputs.workflow == 'build' }}"
      uses: jurplel/install-qt-action@v4
      with:
        # Use a newer Qt build to avoid -framework AGL linker failures on Tahoe.
        # Ref: https://qt-project.atlassian.net/browse/QTBUG-137687
        version: '6.9.2'
        host: 'mac'
        target: 'desktop'
        arch: 'clang_64'
        # qtshadertools provides qsb and the ShaderTools CMake package for QRhi.
        modules: 'qtshadertools'
        setup-python: 'false'
        cache: true

    - name: dependency by pip (common)
      shell: bash
      run: |
        echo "::group::dependency by pip (common)"
        echo "which python3: $(which python3)"
        ls -al $(which python3)
        # suppress the warning of pip because brew forces PEP668 since python3.12
        python3 -m pip -v install --break-system-packages --upgrade setuptools
        python3 -m pip -v install --break-system-packages --upgrade numpy matplotlib pytest flake8 jsonschema
        echo "::endgroup::"

    - name: dependency by pip (lint & build)
      if: "${{ inputs.workflow == 'lint' || inputs.workflow == 'build' }}"
      shell: bash
      run: |
        echo "::group::dependency by pip (lint & build)"
        # For now (2024/10/22), pyside6 6.6.3 does not support Python 3.13.
        # Use --ignore-requires-python to force installation.
        python3 -m pip -v install --upgrade pyside6==$(qmake -query QT_VERSION) --ignore-requires-python
        echo "::endgroup::"

    - name: Install clang-format for lint
      if: ${{ inputs.workflow == 'lint' }}
      shell: bash
      run: |
        echo "::group::Install clang-format for lint"
        # Pinned to the clang-format major version that the Makefile's
        # CLANG_FORMAT_CI_VERSION expects. Installed via pip so the same
        # package works on both Linux and macOS runners.
        python3 -m pip install --break-system-packages --upgrade 'clang-format==20.*'
        clang-format --version
        echo "::endgroup::"

    - name: install pybind11 (pip wheel)
      shell: bash
      run: |
        echo "::group::install pybind11 (pip wheel)"
        python3 -m pip install --break-system-packages --upgrade 'pybind11==3.0.1'
        echo "pybind11_ROOT=$(python3 -c 'import os, pybind11; print(os.path.dirname(pybind11.__file__))')" >> "$GITHUB_ENV"
        echo "::endgroup::"

    - name: dependency (manual) for build
      if: ${{ inputs.workflow == 'build' }}
      shell: bash
      run: |
        echo "::group::dependency (manual) for build"
        thirdparty/metal-cpp.sh
        echo "::endgroup::"

    - name: show dependency
      shell: bash
      run: |
        echo "::group::show dependency"
        contrib/dependency/showdep.sh
        echo "::endgroup::"
