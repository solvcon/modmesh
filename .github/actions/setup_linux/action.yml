name: Set up solvcon CI dependencies on Linux
description: Set up the necessary dependencies for running CI tests on Github action Linux runners

inputs:
  workflow:
    description: The name of the workflow that will use this action
    required: true

runs:
  using: composite
  steps:
    - name: Add swap
      # Prevent hitting runner's resource limits when running clang-tidy
      shell: bash
      run: |
        echo "::group::Add swap"
        # Remove /swapfile first to avoid "fallocate: Text file busy" error
        sudo swapoff -a
        sudo rm -f /swapfile
        sudo fallocate -l 8G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h
        echo "::endgroup::"

    - name: Free disk space
      if: "${{ inputs.workflow == 'lint' || inputs.workflow == 'build' }}"
      shell: bash
      run: |
        echo "::group::Free disk space"
        df -h /
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
                    /opt/hostedtoolcache/CodeQL || true
        df -h /
        echo "::endgroup::"

    - name: Cache Qt download
      if: "${{ inputs.workflow == 'lint' || inputs.workflow == 'build' }}"
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/Qt
        key: ${{ runner.os }}-qt-6.8.1-linux_gcc_64
        # fallback to any previous Qt cache on this OS
        restore-keys: |
          ${{ runner.os }}-qt-6.8.1-

    - name: dependency by apt
      shell: bash
      run: |
        echo "::group::dependency by apt"
        # To update the cmake version > 4, install the latest cmake by kitware apt repository.
        # Reference: https://apt.kitware.com/
        sudo apt-get -y update
        sudo apt-get -qy install ca-certificates gpg wget
        test -f /usr/share/doc/kitware-archive-keyring/copyright || \
            wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | \
            gpg --dearmor - | \
            sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
        echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ noble main' | \
            sudo tee /etc/apt/sources.list.d/kitware.list >/dev/null
        sudo apt-get -qqy update
        test -f /usr/share/doc/kitware-archive-keyring/copyright || \
            sudo rm /usr/share/keyrings/kitware-archive-keyring.gpg
        sudo apt-get -qy install kitware-archive-keyring
        sudo apt-get -qy install \
            sudo curl git build-essential make cmake libc6-dev gcc g++ \
            libopenblas-dev \
            python3 python3-dev python3-venv
        # The path of apt-get cmake is `/usr/bin/cmake`,
        # but the path of built-in cmake of runner image is `/usr/local/bin/cmake`.
        # We remove the built-in cmake.
        sudo rm -rf /usr/local/bin/cmake

        # Install qt6 only with ubuntu-24.04
        # This page explains why we need libgl1-mesa-dev
        # https://doc-snapshots.qt.io/qt6-dev/linux.html
        #
        # In short, OpenGL libraries and headers are required. Without
        # installing this package, cmake won't find the correct lib path.
        # This has been replaced by the 'install qt' section below to manage
        # qt6 versioning independently from the OS.

        # if [ "${{ matrix.os }}" == "ubuntu-24.04" ] ; then \
        #   sudo apt-get -qy install \
        #       qt6-3d-dev xvfb \
        #       libgl1-mesa-dev
        # fi
        echo "::endgroup::"

    - name: Install clang-tidy for lint
      if: ${{ inputs.workflow == 'lint' }}
      shell: bash
      run: |
        echo "::group::Install clang-tidy for lint"
        # Install clang-tidy-22 from LLVM repository for full C++23 support
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
        sudo apt-get -qqy update
        sudo apt-get -qy install clang-tidy-22
        sudo ln -fs "$(which clang-tidy-22)" "/usr/local/bin/clang-tidy"
        echo "::endgroup::"

    - name: Install and configure gcc-16
      shell: bash
      run: |
        echo "::group::Install and configure gcc-16"
        sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
        sudo apt-get -qqy update
        sudo apt-get -qy install gcc-16 g++-16
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-16 100
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-16 100
        sudo update-alternatives --install /usr/bin/cc cc /usr/bin/gcc-16 100
        sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++-16 100
        echo "::endgroup::"

    - name: install qt
      if: "${{ inputs.workflow == 'lint' || inputs.workflow == 'build' }}"
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.1'
        host: 'linux'
        target: 'desktop'
        arch: 'linux_gcc_64'
        modules: 'qt3d'
        setup-python: 'false'
        cache: false

    - name: Set up Xvfb for the xcb platform
      if: "${{ inputs.workflow == 'lint' || inputs.workflow == 'build' }}"
      shell: bash
      run: |
        echo "::group::Set up Xvfb for the xcb platform"
        # libgl1-mesa-dri provides the llvmpipe software rasterizer so the
        # pilot's OpenGL renders under the GPU-less Xvfb display. The X11/XCB
        # libraries are the runtime counterparts of the -dev packages the scdv
        # build script installs (contrib/dependency/ubuntu2404/
        # build-scdv-ubuntu24.sh, scdv_apt_qt_cmd); keep the two sets in sync.
        sudo apt-get -qy install \
            xvfb x11-utils \
            libgl1 libglx-mesa0 libgl1-mesa-dri libegl1 libopengl0 \
            libxkbcommon-x11-0 libx11-xcb1 \
            libxcb1 libxcb-glx0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render0 libxcb-render-util0 \
            libxcb-shape0 libxcb-shm0 libxcb-sync1 libxcb-util1 \
            libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1
        Xvfb :99 -screen 0 1280x1024x24 >/tmp/xvfb.log 2>&1 &
        for _ in $(seq 1 50) ; do
          xdpyinfo -display :99 >/dev/null 2>&1 && break
          sleep 0.2
        done
        xdpyinfo -display :99 >/dev/null 2>&1 \
          || { echo "Xvfb failed to start" >&2 ; cat /tmp/xvfb.log >&2 ; exit 1 ; }
        # Export DISPLAY for xcb.
        echo "DISPLAY=:99" >> "${GITHUB_ENV}"
        # Export QT_QPA_PLATFORM for xcb.
        echo "QT_QPA_PLATFORM=xcb" >> "${GITHUB_ENV}"
        echo "::endgroup::"

    - name: dependency by pip (common)
      shell: bash
      run: |
        echo "::group::dependency by pip (common)"
        sudo pip3 install setuptools
        sudo pip3 install numpy pytest flake8
        echo "::endgroup::"

    - name: dependency by pip (lint & build)
      if: "${{ inputs.workflow == 'lint' || inputs.workflow == 'build' }}"
      shell: bash
      run: |
        echo "::group::dependency by pip (lint & build)"
        sudo pip3 install matplotlib jsonschema
        sudo pip3 install pyside6==$(qmake6 -query QT_VERSION)
        echo "::endgroup::"

    - name: Install clang-format for lint
      if: ${{ inputs.workflow == 'lint' }}
      shell: bash
      run: |
        echo "::group::Install clang-format for lint"
        # Pinned to the clang-format major version that the Makefile's
        # CLANG_FORMAT_CI_VERSION expects. Installed via pip so the same
        # package works on both Linux and macOS runners.
        sudo pip3 install 'clang-format==20.*'
        clang-format --version
        echo "::endgroup::"

    - name: install pybind11 (pip wheel)
      shell: bash
      run: |
        echo "::group::install pybind11 (pip wheel)"
        sudo pip3 install 'pybind11==3.0.1'
        echo "pybind11_ROOT=$(python3 -c 'import os, pybind11; print(os.path.dirname(pybind11.__file__))')" >> "$GITHUB_ENV"
        echo "::endgroup::"

    - name: show dependency
      shell: bash
      run: |
        echo "::group::show dependency"
        contrib/dependency/showdep.sh
        echo "::endgroup::"
